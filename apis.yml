apis:
- aid: bloomberg-government-bgov:bgov-data-api
  name: Bloomberg Government Data API
  description: Access BGOV legislative, regulatory, and government contracting data
    programmatically. Retrieve bill tracking, regulatory actions, federal contract
    awards, and lobbying disclosures for integration into research and compliance
    workflows.
  humanURL: https://about.bgov.com/
  baseURL: https://api.bgov.com
  tags:
  - Legislative
  - Regulatory
  - Government Data
  - Contracting
  properties:
  - type: Documentation
    url: https://about.bgov.com/
- aid: bloomberg-government-bgov:bgov-contracting-api
  name: BGOV Government Contracting Intelligence
  description: Access federal contract award data, procurement intelligence, and
    vendor spending data. Track USASpending.gov data enriched with Bloomberg analytics
    for competitive intelligence and business development.
  humanURL: https://about.bgov.com/federal-contracting-intelligence/
  baseURL: https://api.bgov.com/contracting
