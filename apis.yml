aid: bloomberg-government-bgov
name: Bloomberg Government (BGOV)
description: Bloomberg Government (BGOV) is a comprehensive intelligence platform
  for professionals working at the intersection of government and business. BGOV provides
  legislative tracking, regulatory intelligence, government contracting data, federal
  budget analysis, and policy research tools. It offers APIs and data feeds for integrating
  government and regulatory data into enterprise workflows.
